<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --btn: #1c1c1c; --accent: #ff9f0a; --text: #fff; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        #calc { height: 100%; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; box-sizing: border-box; }
        #display { font-size: 70px; text-align: right; margin-bottom: 20px; min-height: 80px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        button { height: 75px; border-radius: 50%; border: none; background: var(--btn); color: #fff; font-size: 28px; cursor: pointer; }
        .op { background: var(--accent); color: white; }
        #vault { display: none; height: 100vh; flex-direction: column; background: #0b141a; }
        header { padding: 15px; background: #202c33; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; margin: 4px; border-radius: 8px; max-width: 80%; position: relative; font-size: 15px; color: white;}
        .sent { align-self: flex-end; background: #005c4b; }
        .received { align-self: flex-start; background: #202c33; }
        .device-tag { font-size: 9px; color: #8696a0; display: block; margin-top: 4px; }
        #input-area { padding: 10px; background: #202c33; display: flex; gap: 8px; }
        #msgInput { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #2a3942; color: white; }
        #admin { display: none; position: fixed; inset: 0; background: #000; z-index: 999; padding: 20px; overflow-y: auto; }
        .user-row { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="calc">
        <div id="display">0</div>
        <div class="grid">
            <button onclick="p('C')">AC</button><button onclick="p('/')" class="op">÷</button><button onclick="p('*')" class="op">×</button><button onclick="p('DEL')" class="op">⌫</button>
            <button onclick="p('7')">7</button><button onclick="p('8')">8</button><button onclick="p('9')">9</button><button onclick="p('-')" class="op">−</button>
            <button onclick="p('4')">4</button><button onclick="p('5')">5</button><button onclick="p('6')">6</button><button onclick="p('+')" class="op">+</button>
            <button onclick="p('1')">1</button><button onclick="p('2')">2</button><button onclick="p('3')">3</button><button onclick="p('=')" class="op">=</button>
            <button onclick="p('0')" style="grid-column: span 2; border-radius: 40px; text-align: left; padding-left: 30px;">0</button><button onclick="p('.')">.</button>
        </div>
    </div>

    <div id="vault">
        <header>
            <strong>Jarvis Secure</strong>
            <div>
                <button onclick="document.getElementById('admin').style.display='block'" style="background:#333; height:30px; font-size:12px; border-radius:5px; color:white;">Admin</button>
                <button onclick="wipe()" style="background:red; height:30px; font-size:12px; border-radius:5px; color:white;">Wipe</button>
            </div>
        </header>
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="msgInput" placeholder="Message...">
            <button onclick="send()" style="height:40px; border-radius:20px; width:60px; background:#005c4b; color:white;">➤</button>
        </div>
    </div>

    <div id="admin">
        <h2>Admin Panel (Device Info)</h2>
        <div id="user-list"></div>
        <button onclick="document.getElementById('admin').style.display='none'" style="margin-top:20px; width:100%; height:45px; background:var(--accent); border-radius:10px;">Close</button>
    </div>

<script>
    // INITIALIZED WITH YOUR SPECIFIC KEYS
    const firebaseConfig = {
        apiKey: "AIzaSyBfb2z0c2faioPQZl9RKt_qUbBwoZV29-M",
        authDomain: "calculator-cht.firebaseapp.com",
        databaseURL: "https://calculator-cht-default-rtdb.firebaseio.com",
        projectId: "calculator-cht",
        storageBucket: "calculator-cht.firebasestorage.app",
        messagingSenderId: "924770882021",
        appId: "1:924770882021:web:ea8b4ff8192b7961a2df0c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cur = "";
    // Catches device name like "Vivo T4 Pro" or "Windows"
    let myDevice = navigator.userAgent.includes("Android") ? navigator.userAgent.split(';')[2].split(')')[0].trim() : "Windows User";

    function p(v) {
        const d = document.getElementById('display');
        if(v==='='){
            if(cur === "20022026") unlock();
            else try{cur=eval(cur).toString()} catch{cur="Error"}
        } else if(v==='C'){cur=""} else if(v==='DEL'){cur=cur.slice(0,-1)} else{cur+=v}
        d.innerText = cur || "0";
    }

    function unlock() {
        document.getElementById('calc').style.display='none';
        document.getElementById('vault').style.display='flex';
        // Logs device info to Admin Panel
        db.ref('users/'+Date.now()).set({device: myDevice, last: Date.now()});
        load();
    }

    function send() {
        const val = document.getElementById('msgInput').value;
        if(!val) return;
        db.ref('chats').push({text:val, dev:myDevice, time:Date.now()});
        document.getElementById('msgInput').value="";
    }

    function load() {
        db.ref('chats').on('value', (s) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            s.forEach(child => {
                const data = child.val();
                const div = document.createElement('div');
                div.className = `msg ${data.dev === myDevice ? 'sent' : 'received'}`;
                div.innerHTML = `${data.text}<span class="device-tag">${data.dev}</span>`;
                // Manual Delete Function (Safety Measure)
                div.onclick = () => { if(confirm("Delete this message for everyone?")) db.ref('chats/'+child.key).remove(); };
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
        
        // Admin View: See who is using which device
        db.ref('users').on('value', s => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            s.forEach(u => {
                list.innerHTML += `<div class="user-row"><span>Device: <b>${u.val().device}</b></span> <button onclick="db.ref('users/${u.key}').remove()" style="background:red; color:white; height:30px; border-radius:5px;">Remove</button></div>`;
            });
        });
    }

    function wipe() { if(confirm("DANGER: Wipe entire chat history?")) db.ref('chats').remove(); }
</script>
</body>
</html>
